<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Trang web tin tức 24h </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial
        }

        body {
            background: #f2f2f2
        }

        .top {
            background: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            border-bottom: 1px solid #ddd;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #6cab00
        }

        .search input {
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #ccc;
        }



        .login-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border: 2px solid #6a0dad;
            color: #6a0dad;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
        }

        .login-btn:hover {
            background: #6a0dad;
            color: white;
        }

        .icon {
            font-size: 16px;
        }

        .menu {
            background: #76b300;
            padding: 12px 40px;
        }

        .menu a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
        }

        /* Layout */
        .container {
            width: 1200px;
            margin: 20px auto;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 20px;
        }

        /* Main news */
        .main {
            background: #fff;
            padding: 15px;
        }

        .main img {
            width: 100%;
            border-radius: 4px
        }

        .main h2 {
            margin: 10px 0;
            font-size: 22px
        }

        .main p {
            color: #555
        }

        /* Sub news */
        .sub {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .sub div {
            background: #eee;
            padding: 5px
        }

        .sub img {
            width: 100%
        }

        /* Middle column */
        .middle {
            background: #fff;
            padding: 15px;
        }

        .middle .item {
            padding: 10px 0;
            border-bottom: 1px solid #ddd;
        }

        .middle .cat {
            color: #76b300;
            font-size: 13px
        }

        /* Right banner */
        .right {
            background: #76b300;
            color: white;
            text-align: center;
            padding: 20px;
            font-weight: bold;
        }

        .banner {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.2);
            padding: 30px;
        }

        /* Responsive */
        @media(max-width:1200px) {
            .container {
                width: 95%;
                grid-template-columns: 1fr
            }
        }

        .video-phai {
            width: 232px;
            height: auto;
        }

        .news-2col {
            width: 1200px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            background: #fff;
            padding: 20px;
        }

        .news-box {
            border-right: 1px solid #eee;
            padding-right: 20px;
        }

        .news-box:last-child {
            border-right: none;
            padding-right: 0;
        }

        .top-menu {
            display: flex;
            align-items: center;
            background: #1a1a1a;
            padding: 14px 20px;
            color: #00e5ff;
            font-family: Arial, sans-serif;
        }

        .menu-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .menu-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .menu-title {
            font-size: 20px;
            font-weight: bold;
            color: #00e5ff;
            border-bottom: 2px solid #00e5ff;
            padding-bottom: 4px;
        }

        .top-menu a {
            color: #9ff6ff;
            text-decoration: none;
            font-size: 15px;
        }

        .top-menu a:hover {
            color: #00e5ff;
            text-decoration: underline;
        }

        .box-title {
            font-size: 22px;
            color: #6cab00;
            border-bottom: 3px solid #6cab00;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }

        .box-title.green {
            color: #2e9f3d;
            border-color: #2e9f3d;
        }

        .big-news {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .big-news img {
            width: 180px;
            height: 120px;
            object-fit: cover;
        }

        .big-news h3 {
            font-size: 17px;
        }

        .big-news p {
            font-size: 14px;
            color: #555;
        }

        .grid-news {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .grid-news img {
            width: 100%;
            height: 80px;
            object-fit: cover;
        }

        .grid-news p {
            font-size: 13px;
        }

        .list-news {
            padding-left: 15px;
        }

        .news-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            padding: 16px 0;
            background-color: #0f0f0f;
            border-top: 1px solid #2a2a2a;
        }

        .news-item {
            color: #00e5ff;
            font-size: 16px;
            line-height: 1.5;
            cursor: pointer;
        }

        .news-item:hover {
            text-decoration: underline;
        }
